<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starking - Estilo Callejero</title>
    <link rel="stylesheet" href="starking.css">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="logo-container">
            <img src="Img folder/IMG-20260319-WA0002.jpg" alt="Home Logo" class="home-logo">
            <div class="tshirt-logo">
                <img src="Img folder/IMG-20260319-WA0003.jpg" alt="T-Shirt Logo" class="tshirt-image">
                <div class="clothes-preview">
                    <img src="Img folder/IMG-20260319-WA0004.jpg" alt="Ropa en Venta">
                    <p>Ropa Callejera</p>
                </div>
            </div>
        </div>
        <nav>
            <ul class="menu">
                <li><a href="#home">Inicio</a></li>
                <li><a href="#ropa">Ropa</a></li>
                <li><a href="#galeria">Galería</a></li>
                <li><a href="#contacto">Contacto</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="home">
            <h1>Bienvenido a Starking</h1>
            <p>Estilo callejero para los más atrevidos</p>
        </section>
        <section id="ropa">
            <h2>Ropa en Venta</h2>
            <div class="clothes-gallery">
                <div class="clothes-item">
                    <img src="Img folder/IMG-20260319-WA0004.jpg" alt="Camiseta 1">
                    <p>Camiseta Urbana</p>
                    <p class="price">5,00€</p>
                </div>
                <div class="clothes-item">
                    <img src="Img folder/IMG-20260319-WA0001.jpg" alt="Pantalón 1">
                    <p>Pantalón Street</p>
                    <p class="price">5,00€</p>
                </div>
                <!-- Más items aquí -->
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Starking. Todos los derechos reservados.</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
